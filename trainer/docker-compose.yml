services:
  db:
    image: postgres:16-alpine
    container_name: jarvis-trainer-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: trainer
    ports:
      - "5434:5432"
    volumes:
      - trainer-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d trainer"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  trainer-pgdata:
